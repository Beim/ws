name: build

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            binary="ws.exe"
            archive="ws_${version#v}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          else
            binary="ws"
            archive="ws_${version#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"
          echo "binary=${binary}" >> "${GITHUB_OUTPUT}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
          OUTPUT: dist/build/${{ matrix.goos }}_${{ matrix.goarch }}/${{ steps.meta.outputs.binary }}
        run: |
          mkdir -p "$(dirname "${OUTPUT}")"
          make build

      - name: Package archive
        env:
          BINARY: ${{ steps.meta.outputs.binary }}
          ARCHIVE: ${{ steps.meta.outputs.archive }}
          BUILD_DIR: dist/build/${{ matrix.goos }}_${{ matrix.goarch }}
        run: |
          mkdir -p dist/release
          if [[ "${BINARY}" == *.exe ]]; then
            (
              cd "${BUILD_DIR}"
              zip -q "../../release/${ARCHIVE}" "${BINARY}"
            )
          else
            tar -C "${BUILD_DIR}" -czf "dist/release/${ARCHIVE}" "${BINARY}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive }}
          path: dist/release/${{ steps.meta.outputs.archive }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: ws_*
          path: dist/release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/release
          sha256sum * > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
